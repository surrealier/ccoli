name: ralph-style-autonomous-loop
strategy:
  max_iterations: 5
  cycle:
    - plan
    - implement
    - docker_test
    - analyze_failures
    - patch
quality_gates:
  - docker compose -f docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from server-tests
artifacts:
  report_dir: .codex/reports
human_handoff:
  on_failure: "Open report logs and create follow-up tasks"
