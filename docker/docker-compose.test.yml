version: "3.8"

services:
  server-test:
    build:
      context: ..
      dockerfile: docker/Dockerfile.test
    working_dir: /app
    command: >-
      pytest server/tests
    environment:
      - PYTHONPATH=/app/server

  client-sim:
    build:
      context: ..
      dockerfile: docker/Dockerfile.test
    working_dir: /app
    command: python server/tests/client_sim_smoke.py
    environment:
      - PYTHONPATH=/app/server
